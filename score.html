<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Scoreboard - 1920x1080</title>
    <!-- Import Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colors */
            --bg-dark: #060512;
            --gold: #F8B400; 
            --text-white: #ffffff;
            --pill-bg: #000000;
        }

        /* PRISM/OBS Setup: Transparent background, 1920x1080 canvas */
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background: transparent; /* Must be transparent for Live Streams */
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* 
         * MAIN WRAPPER
         * Positioned at the bottom of the 1920x1080 screen 
         */
        .scoreboard-container {
            position: absolute;
            bottom: 40px; /* Distance from bottom */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1860px; /* Slightly less than 1920 to leave safe margins */
            filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.8));
        }

        /* Premium Dark Texture Background */
        .bg-texture {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 80%),
                repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(248, 180, 0, 0.03) 15px, rgba(248, 180, 0, 0.03) 30px);
        }

        /* 
         * LOGO BOXES (Far Left & Far Right) - Scaled for 1080p
         */
        .logo-box {
            position: relative;
            width: 140px;
            height: 108px;
            background: var(--gold);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Your team logos go here */
        .logo-inner img {
            width: 65px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        /* Left Logo Clip Paths */
        .logo-box.left {
            clip-path: polygon(0 0, 110px 0, 140px 54px, 110px 108px, 0 108px);
            margin-right: -30px; 
        }
        .logo-box.left .logo-inner {
            clip-path: polygon(2px 2px, 109px 2px, 137px 54px, 109px 106px, 2px 106px);
        }

        /* Right Logo Clip Paths */
        .logo-box.right {
            clip-path: polygon(30px 0, 140px 0, 140px 108px, 30px 108px, 0 54px);
            margin-left: -30px; 
        }
        .logo-box.right .logo-inner {
            clip-path: polygon(31px 2px, 138px 2px, 138px 106px, 31px 106px, 3px 54px);
        }

        /* 
         * SIDE PANELS (Batters & Bowler)
         */
        .side-panel {
            height: 80px;
            flex: 1;
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Batting Panel Specifics */
        .bat-panel {
            padding: 0 60px 0 55px;
        }
        .batter-row {
            display: flex;
            align-items: center;
            color: var(--text-white);
            font-size: 18px;
            font-weight: 800;
            line-height: 1.6;
            white-space: nowrap;
        }
        .pointer {
            color: var(--gold);
            font-size: 14px;
            width: 20px;
            display: inline-block;
        }
        .b-name {
            flex: 1;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .b-score {
            display: flex;
            gap: 20px;
            width: 70px;
            justify-content: flex-end;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Bowling Panel Specifics */
        .bowl-panel {
            padding: 0 55px 0 60px;
        }
        .bowler-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-white);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
            white-space: nowrap;
        }
        .bowler-name {
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .bowler-stats {
            display: flex;
            gap: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .balls-row {
            display: flex;
            gap: 12px;
        }
        .ball {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
        }

        /* 
         * CENTER BOX (Main Score)
         */
        .center-box {
            position: relative;
            width: 460px;
            height: 120px;
            background: var(--gold);
            z-index: 3;
            margin: 0 -45px; 
            clip-path: polygon(30px 0, 430px 0, 460px 60px, 430px 120px, 30px 120px, 0 60px);
        }
        .center-inner {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            clip-path: polygon(32px 2px, 428px 2px, 457px 60px, 428px 118px, 32px 118px, 3px 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-white);
        }

        .center-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: -8px; 
        }
        
        .teams-text {
            font-size: 18px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .teams-text span {
            font-size: 12px;
            font-weight: 600;
            margin: 0 4px;
            color: #ccc;
        }

        .score-pill {
            background-color: var(--pill-bg);
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 2px 35px;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.6);
        }

        .overs-text {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .overs-text span {
            font-size: 20px;
            font-weight: 900;
        }

        .bottom-tag {
            position: absolute;
            bottom: 8px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        /* Placeholder for logo images */
        .crest-placeholder {
            font-size: 18px;
            color: var(--gold);
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="scoreboard-container">

        <!-- FAR LEFT LOGO -->
        <div class="logo-box left">
            <div class="logo-inner bg-texture">
                <!-- Team 1 Logo: ඔයාගෙ Logo PNG එක මෙතනට දාන්න -->
                <div class="crest-placeholder">STC</div>
                <!-- <img src="team1-logo.png" alt="STC"> -->
            </div>
        </div>

        <!-- LEFT PANEL (BATTERS) -->
        <div class="side-panel bat-panel bg-texture">
            <div class="batter-row">
                <span class="pointer">▶</span>
                <span class="b-name">RAVIDU GUNASEKARA</span>
                <div class="b-score">
                    <span>0</span>
                    <span>0</span>
                </div>
            </div>
            <div class="batter-row">
                <span class="pointer"></span>
                <span class="b-name">SAMITH KANAKARATHNA</span>
                <div class="b-score">
                    <span>0</span>
                    <span>0</span>
                </div>
            </div>
        </div>

        <!-- CENTER BOX (SCORE) -->
        <div class="center-box">
            <div class="center-inner bg-texture">
                <div class="center-main">
                    <div class="teams-text">STC <span>vs</span> GSC</div>
                    <div class="score-pill">20 - 2</div>
                    <div class="overs-text"><span>20</span> OVERS</div>
                </div>
                <div class="bottom-tag">INNING AND INFOR</div>
            </div>
        </div>

        <!-- RIGHT PANEL (BOWLER) -->
        <div class="side-panel bowl-panel bg-texture">
            <div class="bowler-row">
                <span class="bowler-name">DINUJAYA WEERASINHA</span>
                <div class="bowler-stats">
                    <span>0-7</span>
                    <span>10</span>
                </div>
            </div>
            <div class="balls-row">
                <div class="ball"></div>
                <div class="ball"></div>
                <div class="ball"></div>
                <div class="ball"></div>
                <div class="ball"></div>
                <div class="ball"></div>
            </div>
        </div>

        <!-- FAR RIGHT LOGO -->
        <div class="logo-box right">
            <div class="logo-inner bg-texture">
                 <!-- Team 2 Logo: ඔයාගෙ Logo PNG එක මෙතනට දාන්න -->
                 <div class="crest-placeholder">GSC</div>
                 <!-- <img src="team2-logo.png" alt="GSC"> -->
            </div>
        </div>

    </div>

</body>
</html>
